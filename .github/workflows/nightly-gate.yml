# Nightly full gate — runs the complete L0–L8 gate (not just the per-PR `--fast` subset) on a
# schedule, so AOT/trimming regressions, browser-pool (L6) and resource-safety (L7) levels, and the
# full live smoke are caught even though they're too slow/flaky to gate every PR. Manual via dispatch.
name: nightly-gate

on:
  schedule:
    # 03:17 UTC daily (off-peak; odd minute to avoid the cron stampede).
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-gate
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  full-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OCCAM_HOME: ${{ github.workspace }}
      # NO OCCAM_ALLOW_PRIVATE_URLS — it is both vestigial and wrong here. The full gate contains
      # contradictory expectations: L2 session-private-* assert private URLs are BLOCKED, while L5/L9 serve
      # from 127.0.0.1; a job-wide flag breaks the former (6 L2 fails) and the latter passes without it. It
      # also switched off connection pinning, so the gate never exercised the pinned path real users run —
      # the blind spot that let the MDN-404 pool-teardown bug ship. Now the SSRF flag only relaxes the
      # private-IP rejection (pinning stays on), so nothing needs it here.
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'benchmarks/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: npm ci (workers)
        run: npm ci --no-fund --no-audit
        working-directory: workers

      - name: Install Playwright Chromium (+ OS deps)
        # Full gate exercises browser levels (L6 pool / L7 resource safety), so a real Chromium is
        # required — unlike gate-fast, which is HTTP-only.
        run: npx playwright install --with-deps chromium
        working-directory: workers/browser-extract

      # Same publish semantics as ci.yml — live tools/list + L2 transport spawn the staged host
      # (ResolvePublishedHostExecutable / launch-mcp-host.mjs candidate order).
      - name: Publish AOT (linux-x64)
        run: dotnet publish src/FFOccamMcp.Core -c Release -r linux-x64 --self-contained -o ./publish

      # Place OccamMcp.Core at OCCAM_HOME root — first candidate in ResolvePublishedHostExecutable /
      # scripts/lib/resolve-host-binary.mjs (live tools/list public MCP contract).
      - name: Stage published host
        run: cp ./publish/OccamMcp.Core ./OccamMcp.Core && chmod +x OccamMcp.Core && ls -la OccamMcp.Core

      - name: Build gate
        run: dotnet build benchmarks/l0-gate -c Release

      - name: L0–L8 full gate
        # No --fast: runs the complete tiered gate (unit contracts + live smoke + browser + resource).
        run: dotnet run --project benchmarks/l0-gate -c Release
        timeout-minutes: 45
