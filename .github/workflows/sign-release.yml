name: Sign Release Artifacts

on:
  release:
    types: [published]
  # Manual remediation / rerun for an existing tag (e.g. attach signatures after
  # uploading missing platform assets to an already-published release).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sign (e.g. v1.0.0-rc.2)"
        required: true
        type: string

permissions:
  id-token: write
  # Upload .bundle signatures onto the GitHub Release (gh release upload).
  contents: write
  attestations: write

jobs:
  sign:
    # GitHub-only: keyless cosign needs GitHub OIDC.
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${EVENT_TAG:-}"
          if [[ -z "$TAG" ]]; then
            TAG="${INPUT_TAG:-}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "error: no release tag (event.release.tag_name / inputs.tag)" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Signing release tag: $TAG"

      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Release "published" can race ahead of platform asset uploads (linux/osx/win jobs).
          # Retry until archives appear or we time out with a clear message.
          attempt=1
          max_attempts=18
          sleep_s=20
          while true; do
            rm -rf artifacts/*
            mkdir -p artifacts
            if gh release download "$TAG" --repo "${{ github.repository }}" --dir artifacts/ 2>/tmp/gh-dl.err; then
              count="$(find artifacts -maxdepth 1 -type f -name 'ff-occam-*.tar.gz' | wc -l | tr -d ' ')"
              echo "Downloaded assets (tar.gz count=$count):"
              ls -la artifacts/ || true
              if [[ "$count" -ge 1 ]]; then
                break
              fi
              echo "warning: release has no ff-occam-*.tar.gz yet (attempt $attempt/$max_attempts)" >&2
            else
              echo "warning: gh release download failed (attempt $attempt/$max_attempts)" >&2
              cat /tmp/gh-dl.err >&2 || true
            fi
            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "error: timed out waiting for release archives on $TAG" >&2
              echo "hint: ensure occam-release finished uploading linux/osx/win assets, then re-run this workflow." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep "$sleep_s"
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign platform archives (keyless)
        run: |
          set -euo pipefail
          # shellcheck source=scripts/lib/sign-release-archives.sh
          source scripts/lib/sign-release-archives.sh
          mapfile -t archives < <(select_release_archives artifacts)
          echo "Archives to sign (${#archives[@]}):"
          printf '  %s\n' "${archives[@]}"
          for f in "${archives[@]}"; do
            echo "signing $f"
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done

      - name: Upload signatures to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          bundles=(artifacts/ff-occam-*-linux-x64.tar.gz.bundle
                   artifacts/ff-occam-*-osx-arm64.tar.gz.bundle
                   artifacts/ff-occam-*-win-x64.tar.gz.bundle)
          if ((${#bundles[@]} == 0)); then
            echo "error: no signature bundles produced under artifacts/" >&2
            ls -la artifacts/ >&2 || true
            exit 1
          fi
          echo "Uploading ${#bundles[@]} bundle(s) to $TAG (--clobber for deterministic reruns)"
          # --clobber: reruns replace prior .bundle assets for the same filenames.
          gh release upload "$TAG" "${bundles[@]}" --repo "${{ github.repository }}" --clobber
