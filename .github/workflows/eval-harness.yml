name: Eval Harness

on:
  push:
    branches: [main]
    paths:
      - 'corpora/eval-harness/**'
      - 'src/**'
      - 'workers/**'
  pull_request:
    paths:
      - 'corpora/eval-harness/**'
      - 'src/**'
      - 'workers/**'
  workflow_dispatch:
    inputs:
      corpus:
        description: 'Corpus to run (l0-smoke, l4-genome, quality-audit-rotation, all)'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'l0-smoke', 'l4-genome', 'quality-audit-rotation']
      mcp_server:
        description: 'MCP server to test (local published host, or custom)'
        required: false
        default: 'local'
        type: choice
        options: ['local', 'custom']

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  eval:
    name: Evaluation Harness
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        corpus: [l0-smoke, l4-genome, quality-audit-rotation]
        include:
          - corpus: l0-smoke
            threshold_accuracy: 1.0
            threshold_latency: 5000
          - corpus: l4-genome
            threshold_accuracy: 0.85
            threshold_latency: 30000
          - corpus: quality-audit-rotation
            threshold_accuracy: 0.80
            threshold_latency: 10000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install eval harness dependencies
        run: |
          cd corpora/eval-harness
          npm ci

      - name: Build eval harness
        run: |
          cd corpora/eval-harness
          npm run build

      - name: Setup FF-Occam MCP (if local)
        if: ${{ github.event.inputs.mcp_server == 'local' || github.event_name != 'workflow_dispatch' }}
        run: |
          export OCCAM_HOME=${{ github.workspace }}
          ./scripts/occam-doctor.sh
          # Build AOT binary for Linux
          dotnet publish src/FFOccamMcp.Core -c Release -r linux-x64 --self-contained true

      - name: Run evaluation
        id: eval
        env:
          OCCAM_HOME: ${{ github.workspace }}
        run: |
          cd corpora/eval-harness

          HOST_BIN="${GITHUB_WORKSPACE}/src/FFOccamMcp.Core/bin/Release/net10.0/linux-x64/publish/OccamMcp.Core"
          if [ ! -x "$HOST_BIN" ]; then
            HOST_BIN="${GITHUB_WORKSPACE}/OccamMcp.Core"
          fi
          if [ ! -x "$HOST_BIN" ]; then
            echo "error: local Occam MCP host binary not found (expected publish output or OCCAM_HOME/OccamMcp.Core)" >&2
            ls -la "${GITHUB_WORKSPACE}/src/FFOccamMcp.Core/bin/Release/net10.0/linux-x64/publish/" 2>/dev/null || true
            ls -la "${GITHUB_WORKSPACE}/OccamMcp.Core" 2>/dev/null || true
            exit 1
          fi
          echo "Using local MCP host: $HOST_BIN"
          
          if [ "${{ matrix.corpus }}" = "all" ]; then
            CORPORA="l0-smoke l4-genome quality-audit-rotation"
          else
            CORPORA="${{ matrix.corpus }}"
          fi
          
          for CORPUS in $CORPORA; do
            echo "Running corpus: $CORPUS"
            node dist/run.js \
              --corpus "$CORPUS" \
              --server "$HOST_BIN" \
              --output ${{ github.workspace }}/artifacts/eval/${{ matrix.corpus }} \
              --format both \
              --threshold-accuracy ${{ matrix.threshold_accuracy }} \
              --threshold-latency ${{ matrix.threshold_latency }} \
              --threshold-focus 0.8 || {
                echo "Evaluation failed for $CORPUS"
                exit 1
              }
          done

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ matrix.corpus }}
          path: artifacts/eval/${{ matrix.corpus }}/*.html
          retention-days: 30

      - name: Upload JSON reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-json-${{ matrix.corpus }}
          path: artifacts/eval/${{ matrix.corpus }}/*.json
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const artifactDir = `${process.env.GITHUB_WORKSPACE}/artifacts/eval/${{ matrix.corpus }}`;
            if (!fs.existsSync(artifactDir)) return;
            
            const files = fs.readdirSync(artifactDir).filter(f => f.endsWith('.json'));
            if (files.length === 0) return;
            
            const latest = files.sort().pop();
            const report = JSON.parse(fs.readFileSync(path.join(artifactDir, latest), 'utf8'));
            
            const { summary } = report;
            const status = summary.accuracy >= ${{ matrix.threshold_accuracy }} && 
                          summary.avgLatencyMs <= ${{ matrix.threshold_latency }} ? '✅' : '❌';
            
            const body = `## ${status} Eval Harness: ${{ matrix.corpus }}
            
            | Metric | Value | Threshold | Status |
            |--------|-------|-----------|--------|
            | Accuracy | ${(summary.accuracy * 100).toFixed(1)}% | ≥${(parseFloat(${{ matrix.threshold_accuracy }}) * 100).toFixed(0)}% | ${summary.accuracy >= ${{ matrix.threshold_accuracy }} ? '✅' : '❌'} |
            | Avg Latency | ${summary.avgLatencyMs.toFixed(0)}ms | ≤${{ matrix.threshold_latency }}ms | ${summary.avgLatencyMs <= ${{ matrix.threshold_latency }} ? '✅' : '❌'} |
            | Focus Honesty | ${(summary.focusMatchHonesty * 100).toFixed(1)}% | ≥80% | ${summary.focusMatchHonesty >= 0.8 ? '✅' : '❌'} |
            | Total Cases | ${summary.totalCases} | - | - |
            | Passed | ${summary.passed} | - | - |
            | Failed | ${summary.failed} | - | - |
            
            [JSON Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) | [HTML Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # Cross-server comparison job (optional)
  compare:
    name: Cross-Server Comparison
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mcp_server == 'custom'
    needs: eval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run against reference servers
        run: |
          echo "This job would run the eval harness against multiple MCP servers for comparison"
          echo "e.g., FF-Occam MCP vs crawl4ai vs firecrawl vs jina.ai"
          echo "Implementation depends on available MCP server endpoints"