# Agent-First MVP gate — published AOT + subprocess MCP (hermes-smoke + popular-hosts).
# Hermes / any CI: same entrypoint as ./scripts/ci-agent-mvp-gate.sh
#
# Primary CI target: GitHub Actions (short `actions/*@v4` refs).
name: agent-mvp-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: agent-mvp-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: MVP gate (AOT)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'benchmarks/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install worker dependencies
        run: npm ci --no-fund --no-audit
        working-directory: workers

      - name: Agent MVP gate (doctor + hermes + popular-hosts)
        env:
          OCCAM_HOME: ${{ github.workspace }}
        run: bash ./scripts/ci-agent-mvp-gate.sh

      - name: Upload gate artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-mvp-gate-failure
          path: |
            artifacts/agent-popular-hosts/
            artifacts/agent-mvp-gate/
          if-no-files-found: ignore
